server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Tambahkan buffer size untuk menangani response/header besar (Penting untuk Laravel/Sanctum)
    fastcgi_buffers 32 32k;
    fastcgi_buffer_size 64k;
    fastcgi_busy_buffers_size 128k;

    # Allow large file uploads
    client_max_body_size 100M;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    location / {
        client_max_body_size 100M;
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    # Bypass symlink issues on Windows Host -> Docker by directly aliasing the storage path
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        client_max_body_size 100M;
        
        # Tambahkan timeout agar tidak cepat 504/502 saat proses lama
        fastcgi_read_timeout 300;
    }
}
