version: '3.8'

services:
  # PHP Service
  app:
    build:
      context: ./asabri-backend
      dockerfile: Dockerfile
    image: asabri-backend
    container_name: asabri-backend-app
    restart: unless-stopped
    tty: true
    command: sh -c "php artisan storage:link --force && php-fpm"
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
      DB_HOST: db
      DB_PORT: 3307
    volumes:
      - ./asabri-backend:/var/www
    networks:
      - asabri-network

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: asabri-backend-web
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./asabri-backend:/var/www
      - ./asabri-backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - asabri-network

  # Database Service
  db:
    image: mysql:8.0
    container_name: asabri-db
    restart: unless-stopped
    tty: true
    command: --port=3307 --skip-name-resolve
    ports:
      - "3308:3307"
    environment:
      MYSQL_DATABASE: asabri_suratin
      MYSQL_ROOT_PASSWORD: SandiMySQL24
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
      - ./database_backup.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - asabri-network

  # Frontend Service
  frontend:
    build:
      context: ./asabri-frontend
      dockerfile: Dockerfile
    container_name: asabri-frontend
    ports:
      - "5173:5173"
    networks:
      - asabri-network

  # Ngrok Service
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: "39riq8CdPtmq6VqBBqAHhVTXal4_4mQKURa7q6RwcB9J2vCDq"
    command:
      - "http"
      - "frontend:5173"
    ports:
      - "4040:4040"
    networks:
      - asabri-network

networks:
  asabri-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
