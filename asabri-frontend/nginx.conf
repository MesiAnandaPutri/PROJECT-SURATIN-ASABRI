server {
    listen 5173;

    add_header ngrok-skip-browser-warning "true" always;

    proxy_buffers 32 32k;
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;

    # Allow large file uploads
    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    # index.html: JANGAN di-cache, supaya device selalu dapat versi terbaru
    # (setiap rebuild Vite menghasilkan hash baru untuk CSS/JS)
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header ngrok-skip-browser-warning "true" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Cache static assets (CSS/JS/images dengan hash sudah unik per build)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public" always;
            add_header ngrok-skip-browser-warning "true" always;
        }
    }

    # Proxy API requests to the backend Nginx
    location /api {
        client_max_body_size 100M;
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout lebih longgar
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    location /sanctum/ {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
    }

    location /storage/ {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
    }
}
